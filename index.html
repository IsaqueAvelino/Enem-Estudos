<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano de Estudos ENEM 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root{--bg:#FAFAF8; --surface:#FFFFFF; --ink:#1A1A1A; --muted:#666; --line:#EFEFEF; --mt:#3E63DD;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter', sans-serif; background:var(--bg); color:var(--ink); padding:20px;}
  .wrap{max-width:700px; margin:0 auto;}
  
  /* Progresso */
  .progress-section{background:var(--surface); padding:15px; border-radius:10px; border:1px solid var(--line); margin-bottom:20px;}
  .progress-bar{height:10px; background:var(--line); border-radius:5px; margin-top:8px;}
  #barFill{height:100%; background:var(--mt); width:0%; border-radius:5px; transition:0.3s;}
  
  /* Áreas */
  .area{background:var(--surface); border:1px solid var(--line); border-radius:8px; margin-bottom:10px; overflow:hidden;}
  .area-head{padding:12px; font-weight:700; cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
  .area-body{padding:10px; display:none; border-top:1px solid var(--line);}
  .area.open .area-body{display:block;}
  
  /* Tópicos */
  .topic{display:flex; align-items:center; padding:8px 0; cursor:pointer; font-size:14px;}
  .cb{width:18px; height:18px; border:2px solid var(--muted); border-radius:4px; margin-right:10px; flex-shrink:0;}
  .topic.done .cb{background:var(--mt); border-color:var(--mt);}
  .topic.done span{text-decoration:line-through; color:var(--muted);}
  
  .serie-badge{font-size:9px; font-weight:bold; padding:2px 6px; border-radius:4px; margin-left:8px; background:#eee;}
</style>
</head>
<body>

<div class="wrap">
  <div class="progress-section">
    <div style="display:flex; justify-content:space-between;">
      <span>Progresso</span> <span id="pctText">0%</span>
    </div>
    <div class="progress-bar"><div id="barFill"></div></div>
  </div>

  <div id="container"></div>
</div>

<script>
// LISTA EXATA FORNECIDA POR VOCÊ
const DATA = [
  { area: "Linguagens", subjects: [
    { name: "Língua Portuguesa", topics: [
      {t:"Interpretação e gêneros textuais", s:"2º-3º"}, {t:"Funções da linguagem", s:"2º"}, {t:"Figuras de linguagem", s:"2º-3º"}, 
      {t:"Variação linguística", s:"2º-3º"}, {t:"Sintaxe (crase, regência, concordância)", s:"3º"}, {t:"Coesão e coerência", s:"2º-3º"}, {t:"Pontuação e sentido", s:"2º"}
    ]},
    { name: "Literatura", topics: [
      {t:"Romantismo", s:"2º-3º"}, {t:"Realismo/Naturalismo", s:"3º"}, {t:"Modernismo (gerações)", s:"3º"}, {t:"Literatura contemporânea", s:"3º"}, {t:"Texto e contexto histórico", s:"2º-3º"}
    ]},
    { name: "Inglês/Espanhol", topics: [
      {t:"Estratégias e cognatos", s:"2º-3º"}, {t:"Interpretação de textos", s:"2º-3º"}, {t:"Vocabulário e falsos cognatos", s:"3º"}
    ]},
    { name: "Arte e Educação Física", topics: [
      {t:"Movimentos artísticos", s:"2º-3º"}, {t:"Corpo, saúde e esporte", s:"2º-3º"}, {t:"Tecnologias da comunicação", s:"3º"}
    ]}
  ]},
  { area: "História", subjects: [
    { name: "História", topics: [
      {t:"Brasil Colônia e escravidão", s:"2º-3º"}, {t:"Império e Primeira República", s:"2º"}, {t:"Era Vargas", s:"2º-3º"}, {t:"Ditadura Militar e redemocratização", s:"3º"}, 
      {t:"Revoluções (Industrial, Francesa)", s:"2º-3º"}, {t:"Guerras Mundiais e Guerra Fria", s:"2º-3º"}, {t:"História da África e indígena", s:"2º-3º"}
    ]}
  ]},
  { area: "Geografia", subjects: [
    { name: "Geografia", topics: [
      {t:"Globalização e geopolítica", s:"3º"}, {t:"Cartografia e fusos", s:"2º"}, {t:"Climas, biomas e domínios", s:"2º-3º"}, {t:"Urbanização e indústria", s:"2º"}, 
      {t:"Agricultura e questão agrária", s:"2º-3º"}, {t:"Energia e meio ambiente", s:"2º-3º"}, {t:"Demografia e migrações", s:"2º"}
    ]}
  ]},
  { area: "Filosofia e Sociologia", subjects: [
    { name: "Filosofia", topics: [{t:"Filosofia antiga", s:"2º-3º"}, {t:"Contratualistas", s:"3º"}, {t:"Ética e política", s:"2º-3º"}]},
    { name: "Sociologia", topics: [{t:"Clássicos (Marx, Weber, Durkheim)", s:"2º-3º"}, {t:"Trabalho, cultura e cidadania", s:"2º-3º"}, {t:"Movimentos sociais e desigualdade", s:"2º-3º"}, {t:"Direitos humanos", s:"2º-3º"}]}
  ]},
  { area: "Ciências da Natureza", subjects: [
    { name: "Biologia", topics: [{t:"Ecologia (cadeias, ciclos)", s:"2º-3º"}, {t:"Citologia", s:"2º"}, {t:"Genética e Mendel", s:"2º-3º"}, {t:"Fisiologia humana", s:"2º-3º"}, {t:"Evolução", s:"2º-3º"}, {t:"Bioquímica e metabolismo", s:"3º"}]},
    { name: "Química", topics: [{t:"Química ambiental", s:"2º-3º"}, {t:"Estequiometria", s:"3º"}, {t:"Soluções e concentração", s:"2º-3º"}, {t:"Química orgânica", s:"3º"}, {t:"Eletroquímica", s:"3º"}, {t:"Termoquímica", s:"2º-3º"}, {t:"Atomística e ligações", s:"2º"}]},
    { name: "Física", topics: [{t:"Cinemática e Newton", s:"2º-3º"}, {t:"Energia e trabalho", s:"2º-3º"}, {t:"Eletricidade e circuitos", s:"2º-3º"}, {t:"Termologia e calorimetria", s:"2º"}, {t:"Ondulatória e som", s:"2º-3º"}, {t:"Óptica", s:"2º-3º"}, {t:"Física moderna", s:"3º"}]}
  ]},
  { area: "Matemática", subjects: [
    { name: "Proporção", topics: [{t:"Porcentagem", s:"2º"}, {t:"Razão, proporção, regra de 3", s:"2º-3º"}, {t:"Matemática financeira (juros)", s:"2º-3º"}]},
    { name: "Álgebra", topics: [{t:"Função 1º grau", s:"2º"}, {t:"Função 2º grau", s:"2º-3º"}, {t:"Exponencial e logaritmo", s:"3º"}, {t:"Progressões (PA e PG)", s:"2º-3º"}]},
    { name: "Estatística", topics: [{t:"Média, mediana, moda", s:"2º"}, {t:"Leitura de gráficos e tabelas", s:"2º-3º"}, {t:"Probabilidade", s:"2º-3º"}, {t:"Análise combinatória", s:"3º"}]},
    { name: "Geometria", topics: [{t:"Geometria plana", s:"2º"}, {t:"Geometria espacial", s:"3º"}, {t:"Geometria analítica", s:"3º"}, {t:"Trigonometria", s:"3º"}]}
  ]},
  { area: "Redação", subjects: [
    { name: "Estrutura", topics: [{t:"Modelo dissertativo-argumentativo", s:"2º-3º"}, {t:"As 5 competências", s:"2º-3º"}, {t:"Introdução com tese clara", s:"2º-3º"}, {t:"Desenvolvimento com argumentos", s:"2º-3º"}, {t:"Proposta de intervenção", s:"2º-3º"}]},
    { name: "Ferramentas", topics: [{t:"Repertório sociocultural", s:"2º-3º"}, {t:"Conectivos e coesão", s:"2º-3º"}, {t:"Erros que descontam", s:"2º-3º"}]}
  ]}
];

let checks = JSON.parse(localStorage.getItem('enem2026-data')) || {};

function render() {
  const container = document.getElementById('container');
  container.innerHTML = '';
  let total = 0, done = 0;

  DATA.forEach((a, ai) => {
    const areaEl = document.createElement('div');
    areaEl.className = 'area';
    areaEl.innerHTML = `<div class="area-head" onclick="this.parentElement.classList.toggle('open')">${a.area} <span>▼</span></div><div class="area-body"></div>`;
    
    const body = areaEl.querySelector('.area-body');
    a.subjects.forEach((s, si) => {
      body.innerHTML += `<div class="subject-name">${s.name}</div>`;
      s.topics.forEach((t, ti) => {
        const id = `${ai}-${si}-${ti}`;
        total++;
        if(checks[id]) done++;
        body.innerHTML += `
          <div class="topic ${checks[id] ? 'done' : ''}" onclick="toggle('${id}')">
            <div class="cb"></div>
            <span>${t.t} <span class="serie-badge">${t.s}</span></span>
          </div>`;
      });
    });
    container.appendChild(areaEl);
  });
  
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('pctText').innerText = pct + '%';
}

function toggle(id) {
  checks[id] = !checks[id];
  localStorage.setItem('enem2026-data', JSON.stringify(checks));
  render();
}

render();
</script>
</body>
</html>
